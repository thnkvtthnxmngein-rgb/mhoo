<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHOO SHOP - Point System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0a0f1e; color: white; }
        .card-hover { transition: all 0.3s ease; border: 1px solid #1e293b; }
        .card-hover:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="bg-slate-900/90 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-slate-800">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-500 italic cursor-pointer" onclick="showSection('categories')">MHOO SHOP</h1>
            <div class="flex items-center gap-4">
                <!-- แสดง Point -->
                <div class="bg-slate-800 px-3 py-1 rounded-full border border-blue-500/50">
                    <span class="text-blue-400 text-sm">คงเหลือ: </span>
                    <span id="user-points" class="font-bold text-white">0</span>
                    <span class="text-blue-400 text-xs"> P</span>
                </div>
                <button onclick="showSection('topup')" class="bg-blue-600 px-4 py-1 rounded-lg text-sm hover:bg-blue-700">เติมเงิน</button>
            </div>
        </div>
    </nav>

    <!-- Section: Categories -->
    <section id="categories" class="container mx-auto px-4 py-12">
        <h2 class="text-3xl font-bold text-center mb-10">เลือกหมวดหมู่สินค้า</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
            <div onclick="loadProducts('All Script')" class="card-hover bg-slate-800/40 p-8 rounded-3xl text-center cursor-pointer">
                <span class="text-6xl mb-4 block">📦</span>
                <h3 class="text-2xl font-bold">All Script</h3>
            </div>
            <div onclick="loadProducts('Tools')" class="card-hover bg-slate-800/40 p-8 rounded-3xl text-center cursor-pointer">
                <span class="text-6xl mb-4 block">🛠️</span>
                <h3 class="text-2xl font-bold">Tools</h3>
            </div>
        </div>
    </section>

    <!-- Section: Products -->
    <section id="products" class="container mx-auto px-4 py-12 hidden">
        <button onclick="showSection('categories')" class="mb-6 text-slate-400 hover:text-white">← กลับหน้าหลัก</button>
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </section>

    <!-- Section: Topup (ระบบเติมเงิน) -->
    <section id="topup" class="container mx-auto px-4 py-12 hidden">
        <div class="max-w-md mx-auto bg-slate-800/50 p-8 rounded-3xl border border-slate-700">
            <h2 class="text-2xl font-bold mb-6 text-center">เติมเงินเข้าระบบ</h2>
            <p class="text-slate-400 text-sm mb-4">ใส่รหัสบัตรเติมเงิน (ตัวอย่าง: 1234)</p>
            <input type="text" id="topup-code" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl mb-4 text-center text-xl tracking-widest" placeholder="XXXX-XXXX-XXXX">
            <button onclick="processTopup()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold hover:bg-emerald-700 transition">ยืนยันการเติมเงิน</button>
            <button onclick="showSection('categories')" class="w-full mt-4 text-slate-500 text-sm">ยกเลิก</button>
        </div>
    </section>

    <script>
        // ระบบจัดการ Point (ใช้ LocalStorage เก็บข้อมูลในเครื่องผู้ใช้)
        let points = parseInt(localStorage.getItem('userPoints')) || 0;
        updatePointDisplay();

        function updatePointDisplay() {
            document.getElementById('user-points').innerText = points.toLocaleString();
            localStorage.setItem('userPoints', points);
        }

        function showSection(id) {
            ['categories', 'products', 'topup'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // ระบบเติมเงินจำลอง
        function processTopup() {
            const code = document.getElementById('topup-code').value;
            if (code === "1234") { // รหัสทดสอบ
                points += 1000;
                alert("เติมเงินสำเร็จ! ได้รับ 1,000 Point");
                updatePointDisplay();
                document.getElementById('topup-code').value = "";
                showSection('categories');
            } else {
                alert("รหัสไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง");
            }
        }

        // ระบบซื้อสินค้า
        function buyProduct(name, price) {
            if (points >= price) {
                if (confirm(`คุณต้องการซื้อ ${name} ในราคา ${price} Point ใช่หรือไม่?`)) {
                    points -= price;
                    updatePointDisplay();
                    alert(`ซื้อสำเร็จ! ขอบคุณที่ใช้บริการ\nแต้มคงเหลือ: ${points} P`);
                }
            } else {
                alert("Point ของคุณไม่เพียงพอ กรุณาเติมเงินก่อนครับ");
                showSection('topup');
            }
        }

        // โหลดสินค้า (ใช้ข้อมูลจำลองแทน JSON ชั่วคราวเพื่อให้คุณเห็นภาพ)
        const mockData = [
            { name: "Sailor Piece Script", price: 199, category: "All Script", image: "https://via.placeholder.com/400" },
            { name: "Reset Token", price: 49, category: "Tools", image: "https://via.placeholder.com/400" }
        ];

        function loadProducts(category) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            const filtered = mockData.filter(p => p.category === category);
            
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="card-hover bg-slate-900/60 rounded-2xl p-4">
                        <img src="${p.image}" class="w-full rounded-xl mb-4">
                        <h3 class="font-medium">${p.name}</h3>
                        <p class="text-blue-400 font-bold text-lg">${p.price} P</p>
                        <button onclick="buyProduct('${p.name}', ${p.price})" class="mt-4 w-full bg-blue-600 py-2 rounded-xl text-sm">ซื้อด้วย Point</button>
                    </div>
                `;
            });
            showSection('products');
        }
    </script>
</body>
</html>
