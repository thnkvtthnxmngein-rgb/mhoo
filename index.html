<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHOO SHOP - BEYOND THE SURFACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0a0f1e; color: white; overflow-x: hidden; }
        .card-hover { transition: all 0.3s ease; border: 1px solid #1e293b; }
        .card-hover:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .hidden { display: none; }
        .sidebar { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        .sidebar.active { transform: translateX(0); }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="bg-slate-900/90 backdrop-blur-md p-4 sticky top-0 z-40 border-b border-slate-800">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showSection('categories')">
                <svg width="35" height="35" viewBox="0 0 512 512" fill="none"><circle cx="256" cy="256" r="240" fill="#1e293b" stroke="#3b82f6" stroke-width="20"/><path d="M160 220C160 180 200 150 256 150C312 150 352 180 352 220C352 260 312 290 256 290C200 290 160 260 160 220Z" fill="#3b82f6"/></svg>
                <h1 class="text-xl font-bold text-blue-500 italic">MHOO SHOP</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="nav-user-info" class="hidden flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full border border-blue-500/30">
                    <span id="display-username" class="text-sm font-medium text-white">User</span>
                    <span id="user-points" class="text-blue-400 font-bold">0</span><span class="text-blue-400 text-xs text-blue-400">P</span>
                </div>
                <!-- ปุ่มเปิด Sidebar เหมือนในรูป -->
                <button onclick="toggleSidebar()" class="text-white p-2">
                    <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Sidebar Menu (หน้าต่างแบบในรูป) -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>
    <div id="sidebar" class="sidebar fixed top-0 right-0 h-full w-72 bg-black z-50 p-8 flex flex-col">
        <button onclick="toggleSidebar()" class="self-end text-white mb-8 text-2xl">✕</button>
        
        <div class="flex flex-col gap-6 text-xl font-light">
            <button onclick="showSection('categories'); toggleSidebar()" class="text-left hover:text-blue-400">หน้าหลัก</button>
            <button onclick="showSection('categories'); toggleSidebar()" class="text-left hover:text-blue-400">สินค้า</button>
            <button onclick="showSection('topup'); toggleSidebar()" class="text-left hover:text-blue-400">เติมเงิน</button>
            <button onclick="alert('ประวัติการซื้อ'); toggleSidebar()" class="text-left hover:text-blue-400">ประวัติ</button>
            <button onclick="alert('ติดต่อสอบถาม'); toggleSidebar()" class="text-left hover:text-blue-400">ติดต่อ</button>
        </div>

        <div class="mt-auto">
            <button id="sidebar-auth-btn" onclick="showSection('auth-page'); toggleSidebar()" class="bg-white text-black px-6 py-2 rounded-lg flex items-center gap-2 font-medium">
                <span>เข้าสู่ระบบ</span>
            </button>
            <button id="logout-btn" onclick="logout()" class="hidden bg-red-600 text-white px-6 py-2 rounded-lg font-medium">ออกจากระบบ</button>
        </div>
    </div>

    <!-- Section: Auth (สมัครสมาชิก / เข้าสู่ระบบ) -->
    <section id="auth-page" class="container mx-auto px-4 py-20 hidden">
        <div class="max-w-md mx-auto bg-slate-900 border border-slate-800 p-8 rounded-3xl">
            <div class="flex gap-4 mb-8">
                <button onclick="toggleAuthMode('login')" id="login-tab" class="text-xl font-bold border-b-2 border-blue-500 pb-2">เข้าสู่ระบบ</button>
                <button onclick="toggleAuthMode('register')" id="register-tab" class="text-xl font-bold text-slate-500 pb-2">สมัครสมาชิก</button>
            </div>

            <div class="space-y-4">
                <input type="text" id="auth-user" placeholder="ชื่อผู้ใช้งาน" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl outline-none focus:border-blue-500">
                <input type="password" id="auth-pass" placeholder="รหัสผ่าน" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl outline-none focus:border-blue-500">
                <button id="auth-main-btn" onclick="handleAuth()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition">ตกลง</button>
            </div>
        </div>
    </section>

    <!-- Section: Categories (หน้าแรก) -->
    <section id="categories" class="container mx-auto px-4 py-12">
        <h2 class="text-3xl font-bold text-center mb-10">หมวดหมู่สินค้า</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto text-center">
            <div onclick="loadProducts('All Script')" class="card-hover bg-slate-800/30 p-10 rounded-3xl cursor-pointer">
                <span class="text-7xl block mb-4">📦</span><h3 class="text-2xl font-bold">All Script</h3>
            </div>
            <div onclick="loadProducts('Tools')" class="card-hover bg-slate-800/30 p-10 rounded-3xl cursor-pointer">
                <span class="text-7xl block mb-4">🛠️</span><h3 class="text-2xl font-bold">Tools</h3>
            </div>
        </div>
    </section>

    <!-- Section: Topup -->
    <section id="topup" class="container mx-auto px-4 py-20 hidden">
        <div class="max-w-md mx-auto bg-slate-800/40 p-8 rounded-3xl border border-slate-700 text-center">
            <h2 class="text-2xl font-bold mb-6">เติมเงิน (รหัสทดสอบ 1234)</h2>
            <input type="text" id="topup-code" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-center text-2xl mb-4" placeholder="0000">
            <button onclick="processTopup()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold hover:bg-emerald-700">ยืนยัน</button>
        </div>
    </section>

    <!-- Section: Products -->
    <section id="products" class="container mx-auto px-4 py-12 hidden">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </section>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('loggedUser')) || null;
        let authMode = 'login';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        function showSection(id) {
            ['categories', 'products', 'topup', 'auth-page'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            updateUI();
        }

        function toggleAuthMode(mode) {
            authMode = mode;
            document.getElementById('login-tab').className = mode === 'login' ? 'text-xl font-bold border-b-2 border-blue-500 pb-2' : 'text-xl font-bold text-slate-500 pb-2';
            document.getElementById('register-tab').className = mode === 'register' ? 'text-xl font-bold border-b-2 border-blue-500 pb-2' : 'text-xl font-bold text-slate-500 pb-2';
        }

        function handleAuth() {
            const user = document.getElementById('auth-user').value;
            const pass = document.getElementById('auth-pass').value;
            if(!user || !pass) return alert('กรุณากรอกข้อมูล');

            let users = JSON.parse(localStorage.getItem('shopUsers')) || {};

            if(authMode === 'register') {
                if(users[user]) return alert('ชื่อนี้ถูกใช้ไปแล้ว');
                users[user] = { password: pass, points: 0 };
                localStorage.setItem('shopUsers', JSON.stringify(users));
                alert('สมัครสมาชิกสำเร็จ!');
                toggleAuthMode('login');
            } else {
                if(users[user] && users[user].password === pass) {
                    currentUser = { username: user, ...users[user] };
                    localStorage.setItem('loggedUser', JSON.stringify(currentUser));
                    showSection('categories');
                } else {
                    alert('ชื่อหรือรหัสผ่านไม่ถูกต้อง');
                }
            }
        }

        function updateUI() {
            if(currentUser) {
                document.getElementById('nav-user-info').classList.remove('hidden');
                document.getElementById('display-username').innerText = currentUser.username;
                document.getElementById('user-points').innerText = currentUser.points;
                document.getElementById('sidebar-auth-btn').classList.add('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
            } else {
                document.getElementById('nav-user-info').classList.add('hidden');
                document.getElementById('sidebar-auth-btn').classList.remove('hidden');
                document.getElementById('logout-btn').classList.add('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('loggedUser');
            currentUser = null;
            location.reload();
        }

        function processTopup() {
            if(!currentUser) return alert('กรุณาเข้าสู่ระบบก่อน');
            const code = document.getElementById('topup-code').value;
            if(code === "1234") {
                let users = JSON.parse(localStorage.getItem('shopUsers'));
                users[currentUser.username].points += 1000;
                currentUser.points += 1000;
                localStorage.setItem('shopUsers', JSON.stringify(users));
                localStorage.setItem('loggedUser', JSON.stringify(currentUser));
                alert('เติมเงินสำเร็จ!');
                updateUI();
                showSection('categories');
            }
        }

        // สินค้าตัวอย่าง
        const items = [{name:"Sailor Script", price:199, cat:"All Script"}, {name:"Reset Tool", price:49, cat:"Tools"}];
        function loadProducts(c) {
            const grid = document.getElementById('product-grid'); grid.innerHTML = '';
            items.filter(i => i.cat === c).forEach(i => {
                grid.innerHTML += `<div class="card-hover bg-slate-900/60 p-4 rounded-2xl">
                    <div class="aspect-square bg-slate-800 rounded-xl mb-4"></div>
                    <h3 class="font-medium">${i.name}</h3>
                    <p class="text-blue-400 font-bold text-lg">${i.price} P</p>
                    <button onclick="buy('${i.name}',${i.price})" class="mt-4 w-full bg-blue-600 py-2 rounded-xl text-sm">ซื้อเลย</button>
                </div>`;
            });
            showSection('products');
        }

        function buy(n, p) {
            if(!currentUser) return alert('กรุณาเข้าสู่ระบบ');
            if(currentUser.points < p) return alert('Point ไม่พอ');
            let users = JSON.parse(localStorage.getItem('shopUsers'));
            users[currentUser.username].points -= p;
            currentUser.points -= p;
            localStorage.setItem('shopUsers', JSON.stringify(users));
            localStorage.setItem('loggedUser', JSON.stringify(currentUser));
            alert('ซื้อสำเร็จ!');
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
