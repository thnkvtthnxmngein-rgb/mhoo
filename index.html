<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHOO SHOP - BEYOND THE SURFACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0a0f1e; color: white; overflow-x: hidden; }
        .card-hover { transition: all 0.3s ease; border: 1px solid #1e293b; }
        .card-hover:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .hidden { display: none; }
        .sidebar { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        .sidebar.active { transform: translateX(0); }
        .modal-bg { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="bg-slate-900/90 backdrop-blur-md p-4 sticky top-0 z-40 border-b border-slate-800">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showSection('categories')">
                <svg width="35" height="35" viewBox="0 0 512 512" fill="none"><circle cx="256" cy="256" r="240" fill="#1e293b" stroke="#3b82f6" stroke-width="20"/><path d="M160 220C160 180 200 150 256 150C312 150 352 180 352 220C352 260 312 290 256 290C200 290 160 260 160 220Z" fill="#3b82f6"/></svg>
                <h1 class="text-xl font-bold text-blue-500 italic">MHOO SHOP</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="nav-user-info" class="hidden flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full border border-blue-500/30">
                    <span id="display-username" class="text-sm font-medium text-white">User</span>
                    <span id="user-points" class="text-blue-400 font-bold">0</span><span class="text-blue-400 text-xs">P</span>
                </div>
                <button onclick="toggleSidebar()" class="text-white p-2">
                    <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Sidebar Menu -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>
    <div id="sidebar" class="sidebar fixed top-0 right-0 h-full w-72 bg-black z-50 p-8 flex flex-col">
        <button onclick="toggleSidebar()" class="self-end text-white mb-8 text-2xl">✕</button>
        <div class="flex flex-col gap-6 text-xl font-light">
            <button onclick="showSection('categories'); toggleSidebar()" class="text-left hover:text-blue-400">หน้าหลัก</button>
            <button onclick="showSection('categories'); toggleSidebar()" class="text-left hover:text-blue-400">สินค้า</button>
            <button onclick="showSection('topup'); toggleSidebar()" class="text-left hover:text-blue-400">เติมเงิน</button>
            <button onclick="showSection('history'); toggleSidebar()" class="text-left hover:text-blue-400">ประวัติการซื้อ</button>
            <button onclick="alert('ติดต่อ Discord: MHOO#9999'); toggleSidebar()" class="text-left hover:text-blue-400">ติดต่อ</button>
        </div>
        <div class="mt-auto">
            <button id="sidebar-auth-btn" onclick="showSection('auth-page'); toggleSidebar()" class="bg-white text-black px-6 py-2 rounded-lg font-medium">เข้าสู่ระบบ</button>
            <button id="logout-btn" onclick="logout()" class="hidden bg-red-600 text-white px-6 py-2 rounded-lg font-medium w-full">ออกจากระบบ</button>
        </div>
    </div>

    <!-- Section: History (ประวัติการซื้อ) -->
    <section id="history" class="container mx-auto px-4 py-12 hidden">
        <h2 class="text-3xl font-bold mb-8 border-l-4 border-blue-500 pl-4">ประวัติการสั่งซื้อ</h2>
        <div id="history-list" class="space-y-4">
            <!-- ข้อมูลประวัติจะถูกใส่ด้วย JS -->
        </div>
    </section>

    <!-- Modal: รายละเอียดสินค้า -->
    <div id="product-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden modal-bg">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-lg rounded-3xl overflow-hidden relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white">✕</button>
            <img id="modal-img" src="" class="w-full h-64 object-cover">
            <div class="p-6">
                <h3 id="modal-name" class="text-2xl font-bold mb-2">ชื่อสินค้า</h3>
                <p id="modal-desc" class="text-slate-400 mb-6 text-sm">รายละเอียดสินค้าและฟีเจอร์ต่างๆ ของสคริปต์...</p>
                <div class="flex justify-between items-center bg-slate-800 p-4 rounded-2xl">
                    <div>
                        <p class="text-xs text-slate-500">ราคาปัจจุบัน</p>
                        <p class="text-2xl font-bold text-emerald-400"><span id="modal-price">0</span> P</p>
                    </div>
                    <button id="modal-buy-btn" class="bg-blue-600 px-8 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-500/20">ยืนยันการซื้อ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Section: Categories / Products / Auth / Topup (เหมือนเดิม) -->
    <section id="categories" class="container mx-auto px-4 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
            <div onclick="loadProducts('All Script')" class="card-hover bg-slate-800/30 p-10 rounded-3xl cursor-pointer text-center">
                <span class="text-7xl block mb-4">📦</span><h3 class="text-2xl font-bold">All Script</h3>
            </div>
            <div onclick="loadProducts('Tools')" class="card-hover bg-slate-800/30 p-10 rounded-3xl cursor-pointer text-center">
                <span class="text-7xl block mb-4">🛠️</span><h3 class="text-2xl font-bold">Tools</h3>
            </div>
        </div>
    </section>

    <section id="products" class="container mx-auto px-4 py-12 hidden">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </section>

    <section id="auth-page" class="container mx-auto px-4 py-20 hidden">
        <div class="max-w-md mx-auto bg-slate-900 border border-slate-800 p-8 rounded-3xl">
            <div class="flex gap-4 mb-8">
                <button onclick="toggleAuthMode('login')" id="login-tab" class="text-xl font-bold border-b-2 border-blue-500 pb-2">เข้าสู่ระบบ</button>
                <button onclick="toggleAuthMode('register')" id="register-tab" class="text-xl font-bold text-slate-500 pb-2">สมัครสมาชิก</button>
            </div>
            <input type="text" id="auth-user" placeholder="ชื่อผู้ใช้งาน" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl mb-4 outline-none">
            <input type="password" id="auth-pass" placeholder="รหัสผ่าน" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl mb-6 outline-none">
            <button onclick="handleAuth()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">ตกลง</button>
        </div>
    </section>

    <section id="topup" class="container mx-auto px-4 py-20 hidden text-center">
        <div class="max-w-md mx-auto bg-slate-800/40 p-8 rounded-3xl border border-slate-700">
            <h2 class="text-2xl font-bold mb-6 italic text-blue-400">MHOO TOPUP</h2>
            <input type="text" id="topup-code" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-center text-2xl mb-4" placeholder="ระบุรหัส 1234">
            <button onclick="processTopup()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold hover:bg-emerald-700">ยืนยันเติมเงิน</button>
        </div>
    </section>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('loggedUser')) || null;
        const items = [
            {id: 1, name: "Anime Vanguards Script", price: 199, cat: "All Script", desc: "ฟีเจอร์: Auto Farm, Auto Skill, คัดลอกไอเทมอัตโนมัติ", img: "https://via.placeholder.com/400/1e293b/3b82f6?text=Anime+Vanguards"},
            {id: 2, name: "Grand Piece Script", price: 150, cat: "All Script", desc: "ฟีเจอร์: Infinite Stamina, Auto Quest, Fast Attack", img: "https://via.placeholder.com/400/1e293b/3b82f6?text=GPO+Script"},
            {id: 3, name: "Reset Token", price: 49, cat: "Tools", desc: "ใช้สำหรับรีเซ็ตสถิติตัวละครในเกม", img: "https://via.placeholder.com/400/1e293b/3b82f6?text=Reset+Token"}
        ];

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        function showSection(id) {
            ['categories', 'products', 'topup', 'auth-page', 'history'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'history') loadHistory();
            updateUI();
        }

        function openModal(id) {
            const item = items.find(i => i.id === id);
            document.getElementById('modal-name').innerText = item.name;
            document.getElementById('modal-desc').innerText = item.desc;
            document.getElementById('modal-price').innerText = item.price;
            document.getElementById('modal-img').src = item.img;
            document.getElementById('modal-buy-btn').onclick = () => buy(item.name, item.price);
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('product-modal').classList.add('hidden'); }

        function loadProducts(c) {
            const grid = document.getElementById('product-grid'); grid.innerHTML = '';
            items.filter(i => i.cat === c).forEach(i => {
                grid.innerHTML += `
                <div class="card-hover bg-slate-900/60 p-4 rounded-2xl cursor-pointer" onclick="openModal(${i.id})">
                    <img src="${i.img}" class="w-full aspect-video object-cover rounded-xl mb-4">
                    <h3 class="font-medium truncate">${i.name}</h3>
                    <p class="text-blue-400 font-bold">${i.price} P</p>
                    <button class="mt-4 w-full bg-slate-800 py-2 rounded-xl text-xs hover:bg-blue-600 transition">ดูรายละเอียด</button>
                </div>`;
            });
            showSection('products');
        }

        function buy(n, p) {
            if(!currentUser) return alert('กรุณาเข้าสู่ระบบ');
            if(currentUser.points < p) return alert('Point ไม่พอ');
            
            let users = JSON.parse(localStorage.getItem('shopUsers'));
            users[currentUser.username].points -= p;
            
            // บันทึกประวัติ
            const historyObj = { name: n, price: p, date: new Date().toLocaleString() };
            if(!users[currentUser.username].history) users[currentUser.username].history = [];
            users[currentUser.username].history.unshift(historyObj);

            currentUser.points -= p;
            localStorage.setItem('shopUsers', JSON.stringify(users));
            localStorage.setItem('loggedUser', JSON.stringify(currentUser));
            
            alert('🎉 ซื้อสำเร็จ! ตรวจสอบที่หน้าประวัติการซื้อ');
            closeModal();
            updateUI();
        }

        function loadHistory() {
            if(!currentUser) return;
            const users = JSON.parse(localStorage.getItem('shopUsers'));
            const userHistory = users[currentUser.username].history || [];
            const list = document.getElementById('history-list');
            
            if(userHistory.length === 0) {
                list.innerHTML = '<p class="text-slate-500 text-center py-10">ยังไม่มีประวัติการซื้อ</p>';
                return;
            }

            list.innerHTML = userHistory.map(h => `
                <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-blue-400">${h.name}</h4>
                        <p class="text-xs text-slate-500">${h.date}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-emerald-400 font-bold">-${h.price} P</p>
                        <p class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-300">Success</p>
                    </div>
                </div>
            `).join('');
        }

        // ระบบ Auth และ UI (เหมือนเดิมแต่เพิ่มส่วนอัปเดตประวัติ)
        function toggleAuthMode(m) { /* โค้ดเดิม */ }
        function handleAuth() {
            const user = document.getElementById('auth-user').value;
            const pass = document.getElementById('auth-pass').value;
            let users = JSON.parse(localStorage.getItem('shopUsers')) || {};
            if(document.getElementById('register-tab').className.includes('blue')) {
                if(users[user]) return alert('มีชื่อนี้แล้ว');
                users[user] = { password: pass, points: 0, history: [] };
                localStorage.setItem('shopUsers', JSON.stringify(users));
                alert('สมัครสำเร็จ!');
            } else {
                if(users[user] && users[user].password === pass) {
                    currentUser = { username: user, ...users[user] };
                    localStorage.setItem('loggedUser', JSON.stringify(currentUser));
                    showSection('categories');
                } else alert('รหัสผิด');
            }
        }
        function updateUI() {
            if(currentUser) {
                document.getElementById('nav-user-info').classList.remove('hidden');
                document.getElementById('display-username').innerText = currentUser.username;
                document.getElementById('user-points').innerText = currentUser.points;
                document.getElementById('sidebar-auth-btn').classList.add('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
            }
        }
        function processTopup() {
            if(!currentUser) return alert('ล็อคอินก่อน');
            if(document.getElementById('topup-code').value === "1234") {
                let users = JSON.parse(localStorage.getItem('shopUsers'));
                users[currentUser.username].points += 1000;
                currentUser.points += 1000;
                localStorage.setItem('shopUsers', JSON.stringify(users));
                localStorage.setItem('loggedUser', JSON.stringify(currentUser));
                alert('เติมสำเร็จ!'); updateUI(); showSection('categories');
            }
        }
        function logout() { localStorage.removeItem('loggedUser'); location.reload(); }
        updateUI();
    </script>
</body>
</html>
