
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shop - หมวดหมู่สินค้า</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; }
        .category-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .category-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <nav class="bg-slate-900 p-4 sticky top-0 z-50 border-b border-slate-800">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-500">MY SHOP</h1>
            <div class="space-x-6 hidden md:flex">
                <a href="#" class="hover:text-blue-400">หน้าหลัก</a>
                <a href="#" class="text-blue-400">หมวดหมู่</a>
                <a href="#" class="hover:text-blue-400">เติมเงิน</a>
                <a href="#" class="bg-blue-600 px-4 py-1 rounded hover:bg-blue-700">เข้าสู่ระบบ</a>
            </div>
        </div>
    </nav>

    <header class="py-12 text-center">
        <h2 class="text-4xl font-bold mb-2">หมวดหมู่</h2>
        <p class="text-slate-400">เลือกชมสินค้าตามประเภทที่คุณต้องการ</p>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="category-card bg-slate-800 rounded-2xl overflow-hidden border border-slate-700">
                <div class="h-48 bg-slate-700 flex items-center justify-center">
                    <span class="text-5xl">📦</span>
                </div>
                <div class="p-6 text-center">
                    <h3 class="text-xl font-semibold">All Sript</h3>
                    <p class="text-blue-400 mt-2">9 สินค้า</p>
                    <button class="mt-4 w-full bg-slate-700 py-2 rounded-lg hover:bg-slate-600">ดูสินค้า</button>
                </div>
            </div>

            <div class="category-card bg-slate-800 rounded-2xl overflow-hidden border border-slate-700">
                <div class="h-48 bg-slate-700 flex items-center justify-center">
                    <span class="text-5xl">🛠️</span>
                </div>
                <div class="p-6 text-center">
                    <h3 class="text-xl font-semibold">Toll</h3>
                    <p class="text-blue-400 mt-2">1 สินค้า</p>
                    <button class="mt-4 w-full bg-slate-700 py-2 rounded-lg hover:bg-slate-600">ดูสินค้า</button>
                </div>
            </div>

            </div>
    </main>

    <footer class="bg-slate-900 py-8 border-t border-slate-800 text-center text-slate-500">
        <p>© 2024 YourShop Name. All rights reserved.</p>
    </footer>

</body>
</html>
