<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEYOND THE SURFACE - Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0a0f1e; color: white; }
        .card-hover { transition: all 0.3s ease; border: 1px solid #1e293b; }
        .card-hover:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="bg-slate-900/90 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-slate-800">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-500 italic cursor-pointer" onclick="location.reload()">MHOO SHOP</h1>
            <div class="space-x-4">
                <button onclick="showSection('categories')" class="hover:text-blue-400">หมวดหมู่</button>
                <button class="bg-blue-600 px-4 py-1 rounded-lg text-sm hover:bg-blue-700">ติดต่อเรา</button>
            </div>
        </div>
    </nav>

    <!-- Section: Categories -->
    <section id="categories" class="container mx-auto px-4 py-12">
        <h2 class="text-3xl font-bold text-center mb-10">เลือกหมวดหมู่สินค้า</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
            <div onclick="loadProducts('All Script')" class="card-hover bg-slate-800/40 p-8 rounded-3xl text-center cursor-pointer">
                <span class="text-6xl mb-4 block">📦</span>
                <h3 class="text-2xl font-bold">All Script</h3>
                <p class="text-slate-400 mt-2">รวมสคริปต์คุณภาพ</p>
            </div>
            <div onclick="loadProducts('Tools')" class="card-hover bg-slate-800/40 p-8 rounded-3xl text-center cursor-pointer">
                <span class="text-6xl mb-4 block">🛠️</span>
                <h3 class="text-2xl font-bold">Tools</h3>
                <p class="text-slate-400 mt-2">อุปกรณ์เสริมต่างๆ</p>
            </div>
        </div>
    </section>

    <!-- Section: Products -->
    <section id="products" class="container mx-auto px-4 py-12 hidden">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="showSection('categories')" class="text-slate-400 hover:text-white font-bold">← กลับ</button>
            <h2 id="cat-title" class="text-2xl font-bold border-l-4 border-blue-500 pl-3 uppercase">สินค้า</h2>
        </div>
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <!-- สินค้าจะถูกใส่ที่นี่ด้วย JavaScript -->
        </div>
    </section>

    <script>
        let allData = [];

        // ฟังก์ชันดึงข้อมูลจากไฟล์ JSON (หลังบ้าน)
        async function fetchData() {
            try {
                const response = await fetch('data.json');
                allData = await response.json();
            } catch (err) {
                console.error("โหลดข้อมูลไม่สำเร็จ", err);
            }
        }

        function showSection(id) {
            document.getElementById('categories').classList.add('hidden');
            document.getElementById('products').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        async function loadProducts(category) {
            if (allData.length === 0) await fetchData();
            
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ''; // ล้างค่าเก่า
            document.getElementById('cat-title').innerText = category;

            const filtered = allData.filter(p => p.category === category);
            
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="card-hover bg-slate-900/60 rounded-2xl p-4 flex flex-col">
                        <img src="${p.image}" class="w-full aspect-square object-cover rounded-xl mb-4">
                        <h3 class="font-medium truncate">${p.name}</h3>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-emerald-400 font-bold text-xl">${p.price}฿</span>
                            <span class="text-slate-500 text-xs">คงเหลือ ${p.stock}</span>
                        </div>
                        <button onclick="alert('กำลังพัฒนาระบบชำระเงิน')" class="mt-4 w-full bg-indigo-600 py-2 rounded-xl hover:bg-indigo-700 transition">ซื้อเลย</button>
                    </div>
                `;
            });

            showSection('products');
        }

        // เริ่มต้นโหลดข้อมูลเตรียมไว้
        fetchData();
    </script>
</body>
</html>
